<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400, height=600">
<title>Chat Overlay</title>
<script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 400px; height: 600px;
  background: #00ff00;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
#chat {
  position: absolute;
  bottom: 10px; left: 10px; right: 10px;
  display: flex;
  flex-direction: column-reverse;
  gap: 4px;
  max-height: 580px;
  overflow: hidden;
}
.msg {
  background: rgba(0,0,0,0.55);
  border-radius: 6px;
  padding: 6px 10px;
  color: #fff;
  font-size: 15px;
  line-height: 1.35;
  animation: fadeIn .3s ease;
  flex-shrink: 0;
}
.msg .user {
  font-weight: 700;
  margin-right: 6px;
}
.msg .user::after { content: ':'; }
.msg .text {
  font-weight: 500;
  word-break: break-word;
}
.msg .badge { height: 16px; vertical-align: middle; margin-right: 3px; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div id="chat"></div>
<script>
const MAX = 20;
const chat = document.getElementById('chat');
const channel = new URLSearchParams(location.search).get('channel') || 'zed-bx';
const simulate = new URLSearchParams(location.search).get('simulate');

ComfyJS.Init(channel);

ComfyJS.onChat = (user, message, flags, self, extra) => {
  const div = document.createElement('div');
  div.className = 'msg';

  const badges = extra.userBadges || [];
  let badgeHtml = '';
  badges.forEach(b => {
    badgeHtml += `<img class="badge" src="${b.url || ''}" alt="">`;
  });

  div.innerHTML = `${badgeHtml}<span class="user">${extra.displayName || user}</span><span class="text">${escapeHtml(message)}</span>`;
  chat.appendChild(div);

  while (chat.children.length > MAX) {
    chat.removeChild(chat.firstChild);
  }
};

if (simulate) {
  const testUsers = [
    { name: 'StreamFan42', badges: ['https://kick.com/assets/badges/sub-1.png'] },
    { name: 'ChatMaster', badges: [] },
    { name: 'KickMod', badges: ['https://kick.com/assets/badges/mod.png'] },
    { name: 'NewUser', badges: [] },
    { name: 'SubKilla', badges: ['https://kick.com/assets/badges/sub-1.png'] },
  ];
  const testMessages = [
    'Hey! Great stream!',
    "LOL that was funny 😂",
    'First time watching, hi everyone!',
    'Keep it up! 🔥',
    'Hello from the chat!',
    'Nice overlay setup!',
    'PogChamp!',
    'Can you play this song?',
    'Hello! 👋',
    'Fire emoji 🔥🔥🔥',
    'Love the vibes here',
    'What game is this?',
  ];
  let idx = 0;
  function addTestMsg() {
    const u = testUsers[Math.floor(Math.random() * testUsers.length)];
    const msg = testMessages[Math.floor(Math.random() * testMessages.length)];
    const div = document.createElement('div');
    div.className = 'msg';
    let badgeHtml = u.badges.map(b => `<img class="badge" src="${b}" alt="" onerror="this.style.display='none'">`).join('');
    div.innerHTML = `${badgeHtml}<span class="user">${u.name}</span><span class="text">${escapeHtml(msg)}</span>`;
    chat.appendChild(div);
    while (chat.children.length > MAX) chat.removeChild(chat.firstChild);
    idx++;
    setTimeout(addTestMsg, 3000 + Math.random() * 4000);
  }
  setTimeout(addTestMsg, 2000);
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, c => map[c]);
}
</script>
</body>
</html>

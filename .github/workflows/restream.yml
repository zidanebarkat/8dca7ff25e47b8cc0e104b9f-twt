name: Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL
        required: true
      output_url:
        description: RTMP/SRT URL
        required: true
      fallback_video:
        description: Fallback Video URL
        required: false
        default: 'https://cdn.pixabay.com/video/2025/10/23/311602_large.mp4'
      fallback_playlist:
        description: Fallback Music Playlist
        required: false
        default: |-
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/yFLu7P69mDjxhW2aF5MS16GVCqpw4oCqSKw4eSVN.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/Djej42Pty0GrF6VFUNzYPDxsuhCwgWzF9ZHWFsZY.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/3CujPNW3YlSqNkWQSgsgysHBl1YPOXRsqBTX2gh0.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/hMRyjksozJqHXKTqLJLjhV9dVMNMywBPJIGhzEFh.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/Lq2CptklJpFylGJ8xFTGf9Ao6wzrNu6qkZY1wmgb.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/I0x2w0gQdIqJ8WX6qkbn2j7OPWZhJqsncWBvOaf7.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/wUFY7RnCiQIfvL3FAlyKRifL7wxYF4LN6Trb6aOh.mp3
      overlay_text:
        description: Overlay text on video
        required: false
        default: ''
      browser_overlay_url:
        description: Browser overlay URL (chat, alerts, etc.)
        required: false
        default: ''
      cookies_b64:
        description: Base64-encoded cookies.txt for YouTube sources
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      preview:
        description: Preview mode (no streaming, saves local file)
        required: false
        default: 'false'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg fonts-dejavu-core curl unzip
          pip install -q yt-dlp curl_cffi
          curl -fsSL https://deno.land/install.sh | sh || true
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup cookies
        run: |
          RAW="${{ inputs.cookies_b64 }}"
          if [ -n "$RAW" ]; then
            if echo "$RAW" | base64 -d &>/dev/null && echo "$RAW" | base64 -d 2>/dev/null | head -1 | grep -qi 'netscape\|#.*cookie'; then
              echo "$RAW" | base64 -d > cookies.txt
              echo "Cookies decoded from base64 ($(wc -c < cookies.txt) bytes)"
            elif echo "$RAW" | head -1 | grep -qi 'netscape\|#.*cookie'; then
              echo "$RAW" > cookies.txt
              echo "Cookies used as raw text ($(wc -c < cookies.txt) bytes)"
            else
              echo "$RAW" | base64 -d > cookies.txt 2>/dev/null || echo "$RAW" > cookies.txt
              echo "Cookies saved ($(wc -c < cookies.txt) bytes)"
            fi
            echo "COOKIES=--cookies cookies.txt" >> $GITHUB_ENV
          else
            echo "COOKIES=" >> $GITHUB_ENV
            echo "No cookies provided, trying without"
          fi

      - name: Write overlay filter script
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          cat > /tmp/beveled.txt << 'FILTEREOF'
          drawtext=textfile=overlay.txt:reload=1:fontfile=FONT_PLACEHOLDER:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=FONT_PLACEHOLDER:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=FONT_PLACEHOLDER:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=FONT_PLACEHOLDER:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6
          FILTEREOF
          sed -i "s|FONT_PLACEHOLDER|$FONT|g" /tmp/beveled.txt

      - name: Create chat FIFO
        run: |
          mkfifo /tmp/chat_overlay.fifo 2>/dev/null || true
          (while true; do dd if=/dev/zero bs=960000 count=1 2>/dev/null > /tmp/chat_overlay.fifo; done) &

      - name: Resolve source
        id: resolve
        run: |
          echo "=== Trying live HLS first ==="
          urls=$(yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES -g --socket-timeout 30 "${{ inputs.source_url }}" 2>/tmp/yt_err.txt) || true
          cat /tmp/yt_err.txt
          if [ -n "$urls" ]; then
            count=$(echo "$urls" | wc -l)
            if [ "$count" -ge 2 ]; then
              echo "video_url=$(echo "$urls" | head -1)" >> "$GITHUB_OUTPUT"
              echo "audio_url=$(echo "$urls" | sed -n '2p')" >> "$GITHUB_OUTPUT"
              echo "has_separate_audio=true" >> "$GITHUB_OUTPUT"
            else
              echo "video_url=$urls" >> "$GITHUB_OUTPUT"
              echo "audio_url=" >> "$GITHUB_OUTPUT"
              echo "has_separate_audio=false" >> "$GITHUB_OUTPUT"
            fi
            echo "mode=stream" >> "$GITHUB_OUTPUT"
            echo "live=true" >> "$GITHUB_OUTPUT"
            echo "Resolved as live stream"
          else
            echo "=== Not live, downloading video ==="
            yt-dlp --impersonate chrome --remote-components ejs:github --extractor-args "youtube:player_client=web" $COOKIES \
              -f "bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
              --merge-output-format mp4 -o "source_video.mp4" \
              "${{ inputs.source_url }}" 2>&1 || true
            if [ -f "source_video.mp4" ] && [ -s "source_video.mp4" ]; then
              echo "mode=download" >> "$GITHUB_OUTPUT"
              echo "live=true" >> "$GITHUB_OUTPUT"
              echo "Downloaded video: $(ls -lh source_video.mp4 | awk '{print $5}')"
            else
              echo "live=false" >> "$GITHUB_OUTPUT"
              echo "ERROR: Failed to resolve or download source"
              exit 1
            fi
          fi

      - name: Overlay text updater
        run: |
          echo "${{ inputs.overlay_text }}" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt 2>/dev/null || true
            sleep 10
          done) &

      - name: Schedule self-reboot (before 6h limit)
        if: inputs.github_token != '' && inputs.preview != 'true'
        run: |
          (sleep 21000 && curl -s -X POST \
            -H "Authorization: Bearer ${{ inputs.github_token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
            -d '{"ref":"main","inputs":{
              "source_url":"${{ inputs.source_url }}",
              "output_url":"${{ inputs.output_url }}",
              "overlay_text":"${{ inputs.overlay_text }}",
              "browser_overlay_url":"${{ inputs.browser_overlay_url }}",
              "cookies_b64":"${{ inputs.cookies_b64 }}",
              "fallback_video":"${{ inputs.fallback_video }}",
              "fallback_playlist":"${{ inputs.fallback_playlist }}",
              "github_token":"${{ inputs.github_token }}"
            }}') &

      - name: Fallback restream
        if: steps.resolve.outputs.live != 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          BEVELED=$(cat /tmp/beveled.txt)
          echo "[0:v]scale=1280:720,$BEVELED[main];[2:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto[out]" > /tmp/vf.txt
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          URL="${{ inputs.output_url }}"
          while true; do
            ffmpeg -nostdin -re -stream_loop -1 -i brb.mp4 -f concat -safe 0 -i concat.txt -f rawvideo -pix_fmt rgba -s 400x600 -r 5 -i /tmp/chat_overlay.fifo \
              -filter_complex_script /tmp/vf.txt -map '[out]' -map 1:a \
              -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 96k \
              -shortest -bufsize 3000k -maxrate 1500k -g 60 -pix_fmt yuv420p \
              -f flv "$URL" || true
            echo "Restream died, restarting in 10s..."
            sleep 10
          done

      - name: Live restream
        if: steps.resolve.outputs.live == 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          BEVELED=$(cat /tmp/beveled.txt)
          URL="${{ inputs.output_url }}"
          MODE="${{ steps.resolve.outputs.mode }}"
          if [ "$MODE" = "download" ]; then
            echo "[0:v]scale=1280:720,$BEVELED[main];[1:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto[out]" > /tmp/vf.txt
            while true; do
              ffmpeg -nostdin -re -stream_loop -1 -i source_video.mp4 \
                -f rawvideo -pix_fmt rgba -s 400x600 -r 5 -i /tmp/chat_overlay.fifo \
                -filter_complex_script /tmp/vf.txt -map '[out]' -map 0:a \
                -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 96k \
                -shortest -bufsize 3000k -maxrate 1500k -g 60 -pix_fmt yuv420p \
                -f flv "$URL" || true
              echo "Restream died, restarting in 10s..."
              sleep 10
            done
          else
            HAS_AUDIO="${{ steps.resolve.outputs.has_separate_audio }}"
            if [ "$HAS_AUDIO" = "true" ]; then
          echo "[0:v]scale=1280:720,$BEVELED[main];[2:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto[out]" > /tmp/vf.txt
              while true; do
                ffmpeg -nostdin -re -i "${{ steps.resolve.outputs.video_url }}" -i "${{ steps.resolve.outputs.audio_url }}" \
                  -f rawvideo -pix_fmt rgba -s 400x600 -r 5 -i /tmp/chat_overlay.fifo \
                  -filter_complex_script /tmp/vf.txt -map '[out]' -map 1:a \
                  -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 96k \
                  -bufsize 3000k -maxrate 1500k -g 60 -pix_fmt yuv420p \
                  -f flv "$URL" || true
                echo "Restream died, restarting in 10s..."
                sleep 10
              done
            else
              echo "[0:v]scale=1280:720,$BEVELED[main];[1:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto[out]" > /tmp/vf.txt
              while true; do
                ffmpeg -nostdin -re -i "${{ steps.resolve.outputs.video_url }}" \
                  -f rawvideo -pix_fmt rgba -s 400x600 -r 5 -i /tmp/chat_overlay.fifo \
                  -filter_complex_script /tmp/vf.txt -map '[out]' -map 0:a \
                  -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 96k \
                  -bufsize 3000k -maxrate 1500k -g 60 -pix_fmt yuv420p \
                  -f flv "$URL" || true
                echo "Restream died, restarting in 10s..."
                sleep 10
              done
            fi
          fi

name: Restream
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Source URL
        required: true
      output_url:
        description: Kick RTMP/SRT URL
        required: true
      fallback_video:
        description: Fallback Video URL
        required: false
        default: 'https://cdn.pixabay.com/video/2025/10/23/311602_large.mp4'
      fallback_playlist:
        description: Fallback Music Playlist
        required: false
        default: |-
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/yFLu7P69mDjxhW2aF5MS16GVCqpw4oCqSKw4eSVN.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/Djej42Pty0GrF6VFUNzYPDxsuhCwgWzF9ZHWFsZY.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/3CujPNW3YlSqNkWQSgsgysHBl1YPOXRsqBTX2gh0.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/hMRyjksozJqHXKTqLJLjhV9dVMNMywBPJIGhzEFh.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/Lq2CptklJpFylGJ8xFTGf9Ao6wzrNu6qkZY1wmgb.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/I0x2w0gQdIqJ8WX6qkbn2j7OPWZhJqsncWBvOaf7.mp3
          https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/wUFY7RnCiQIfvL3FAlyKRifL7wxYF4LN6Trb6aOh.mp3
      overlay_text:
        description: Overlay text on video
        required: false
        default: ''
      browser_overlay_url:
        description: Browser overlay URL (chat, alerts, etc.)
        required: false
        default: ''
      github_token:
        description: GitHub PAT for self-trigger
        required: false
        default: ''
      preview:
        description: Preview mode (no streaming, saves local file)
        required: false
        default: 'false'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/restream.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg build-essential libssl-dev fonts-dejavu-core xvfb chromium-browser x11-xserver-utils
          pip install -q yt-dlp curl_cffi

      - name: Validate font
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          [ -f "$FONT" ] || { echo "FATAL: font missing at $FONT"; exit 1; }

      - name: Try resolve source HLS
        id: resolve
        run: |
          hls=$(yt-dlp --impersonate chrome -g --socket-timeout 15 "${{ inputs.source_url }}" 2>/dev/null | tail -1) || true
          if [ -z "$hls" ]; then
            echo "live=false" >> "$GITHUB_OUTPUT"
          else
            echo "hls=$hls" >> "$GITHUB_OUTPUT"
            echo "live=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare fallback assets
        if: steps.resolve.outputs.live != 'true'
        env:
          PLAYLIST: ${{ inputs.fallback_playlist }}
        run: |
          curl -L -o brb.mp4 "${{ inputs.fallback_video }}"
          echo "$PLAYLIST" > playlist_urls.txt
          idx=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            idx=$((idx+1))
            if curl -L -o "track_${idx}.mp3" "$url" 2>/dev/null && [ -s "track_${idx}.mp3" ] && ffprobe -i "track_${idx}.mp3" -show_entries format=duration -v quiet -of csv=p=0 >/dev/null 2>&1; then
              :
            else
              yt-dlp --impersonate chrome -o "track_${idx}.%(ext)s" "$url" 2>/dev/null || true
            fi
          done < playlist_urls.txt
          > concat.txt
          for rep in $(seq 1 100); do
            for i in $(seq 1 $idx); do
              for f in track_$i.*; do
                [ -f "$f" ] && ffprobe -i "$f" -show_entries format=duration -v quiet -of csv=p=0 >/dev/null 2>&1 && echo "file '$f'" >> concat.txt
                break
              done
            done
          done

      - name: Start browser overlay
        run: |
          python3 -m http.server --directory "${{ github.workspace }}" 9999 &
          sleep 1
          Xvfb :99 -screen 0 400x600x24 &
          sleep 2
          xsetroot -display :99 -solid "#00ff00"
          if [ -n "${{ inputs.browser_overlay_url }}" ]; then
            OVURL="${{ inputs.browser_overlay_url }}"
          else
            OVURL="http://127.0.0.1:9999/chat_overlay.html?channel=zed-bx"
          fi
          DISPLAY=:99 chromium-browser --no-sandbox --disable-gpu --disable-extensions --disable-dev-shm-usage --no-first-run --window-size=400,600 --window-position=0,0 --app="$OVURL" &
          sleep 8
          echo "browser=ready" >> "$GITHUB_ENV"

      - name: Schedule self-reboot (before 6h limit)
        if: inputs.github_token != '' && inputs.preview != 'true'
        run: |
          (sleep 21000 && curl -s -X POST \
            -H "Authorization: Bearer ${{ inputs.github_token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/restream.yml/dispatches" \
            -d '{"ref":"main","inputs":{
              "source_url":"${{ inputs.source_url }}",
              "output_url":"${{ inputs.output_url }}",
              "overlay_text":"${{ inputs.overlay_text }}",
              "browser_overlay_url":"${{ inputs.browser_overlay_url }}",
              "fallback_video":"${{ inputs.fallback_video }}",
              "fallback_playlist":"${{ inputs.fallback_playlist }}",
              "github_token":"${{ inputs.github_token }}"
            }}') &

      - name: Fallback restream
        if: steps.resolve.outputs.live != 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          CHAT="drawtext=textfile=chat.txt:reload=1:fontfile=$FONT:fontsize=22:fontcolor=white:x=15:y=h-th-420:box=1:boxcolor=black@0.5:boxborderw=8"
          VF="[0:v]scale=1920:1080,$BEVELED[main];[2:v]scale=400:-1,colorkey=0x00ff00:0.2:0.0[over];[main][over]overlay=20:main_h-overlay_h-20[out]"
          CMD="ffmpeg -nostdin -re -stream_loop -1 -i brb.mp4 -f concat -safe 0 -i concat.txt -f x11grab -framerate 30 -video_size 400x600 -i :99.0 -filter_complex \"$VF\" -map '[out]' -map 1:a -c:v libx264 -preset ultrafast -b:v 2000k -c:a aac -b:a 96k -shortest -bufsize 4000k -maxrate 2000k -g 60"
          if [[ "${{ inputs.preview }}" == "true" ]]; then
            CMD="$CMD -f null -"
          else
            URL="${{ inputs.output_url }}"
            if [[ "$URL" == srt://* ]]; then
              CMD="$CMD -f mpegts \"$URL\""
            else
              CMD="$CMD -f flv \"$URL\""
            fi
          fi
          eval "$CMD"

      - name: Live restream
        if: steps.resolve.outputs.live == 'true'
        env:
          OT: ${{ inputs.overlay_text }}
        run: |
          HLS="${{ steps.resolve.outputs.hls }}"
          PWL="file,http,https,tcp,tls,crypto,srt,rtmp,rtmps"
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          echo "$OT" > overlay.txt
          (while true; do
            curl -s "https://strwithgit.pythonanywhere.com/config" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overlay_text',''))" > overlay.txt
            sleep 10
          done) &
          BEVELED="drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=overlay.txt:reload=1:fontfile=$FONT:fontsize=h*0.05:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          CHAT="drawtext=textfile=chat.txt:reload=1:fontfile=$FONT:fontsize=22:fontcolor=white:x=15:y=h-th-420:box=1:boxcolor=black@0.5:boxborderw=8"
          VF="[0:v]$BEVELED[main];[1:v]scale=400:-1,colorkey=0x00ff00:0.2:0.0[over];[main][over]overlay=20:main_h-overlay_h-20[out]"
          CMD="ffmpeg -nostdin -re -protocol_whitelist \"$PWL\" -fflags +discardcorrupt -timeout 30000000 -i \"$HLS\" -f x11grab -framerate 30 -video_size 400x600 -i :99.0 -filter_complex \"$VF\" -map '[out]' -map 0:a -c:v libx264 -preset ultrafast -b:v 2000k -c:a aac -b:a 96k -bufsize 4000k -maxrate 2000k -g 60"
          if [[ "${{ inputs.preview }}" == "true" ]]; then
            CMD="$CMD -f null -"
          else
            URL="${{ inputs.output_url }}"
            if [[ "$URL" == srt://* ]]; then
              CMD="$CMD -f mpegts \"$URL\""
            else
              CMD="$CMD -f flv \"$URL\""
            fi
          fi
          eval "$CMD"

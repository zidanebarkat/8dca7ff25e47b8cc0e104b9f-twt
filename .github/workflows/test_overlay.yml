name: Test Overlay (no streaming)
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-overlay

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            ffmpeg fonts-dejavu-core
          pip install -q websocket-client pillow curl_cffi

      - name: Create test background video
        run: |
          ffmpeg -f lavfi -i "color=c=blue:s=1920x1080:d=30:r=30" \
            -f lavfi -i "anullsrc=r=44100:cl=mono" \
            -vf "drawtext=text='TEST BACKGROUND':fontsize=48:fontcolor=white:x=(w-text_w)/2:y=(h-text_h)/2" \
            -shortest -y brb.mp4

      - name: Start Python chat overlay (simulate mode)
        run: |
          mkfifo /tmp/chat_overlay.fifo
          python3 ${{ github.workspace }}/chat_overlay.py \
            --channel zed-bx --fifo /tmp/chat_overlay.fifo --simulate &
          sleep 2

      - name: Capture test output
        run: |
          FONT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          BEVELED="drawtext=textfile=${{ github.workspace }}/overlay.txt:reload=1:fontfile=$FONT:fontsize=54:fontcolor=0x1a0b2e:x=(w-text_w)/2+5:y=(h-text_h)/2+5,drawtext=textfile=${{ github.workspace }}/overlay.txt:reload=1:fontfile=$FONT:fontsize=54:fontcolor=0x3a1f5e:x=(w-text_w)/2+3:y=(h-text_h)/2+3,drawtext=textfile=${{ github.workspace }}/overlay.txt:reload=1:fontfile=$FONT:fontsize=54:fontcolor=0x6b3f96:x=(w-text_w)/2+1:y=(h-text_h)/2+1,drawtext=textfile=${{ github.workspace }}/overlay.txt:reload=1:fontfile=$FONT:fontsize=54:fontcolor=0xC9A2FF:box=1:boxcolor=0x0a0512@0.6:boxborderw=26:bordercolor=0x1a0b2e:borderw=2:x=(w-text_w)/2:y=(h-text_h)/2:shadowcolor=black@0.85:shadowx=6:shadowy=6"
          echo "Test Overlay" > overlay.txt
          VF="[0:v]scale=1920:1080,$BEVELED[main];[1:v]format=rgba[ov];[main][ov]overlay=20:main_h-overlay_h-20:format=auto[out]"
          ffmpeg -nostdin -re -stream_loop -1 -i brb.mp4 \
            -f rawvideo -pix_fmt rgba -s 400x600 -r 5 -i /tmp/chat_overlay.fifo \
            -filter_complex "$VF" -map '[out]' \
            -c:v libx264 -preset ultrafast -b:v 2000k \
            -t 20 -y test_output.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: overlay-test
          path: test_output.mp4
